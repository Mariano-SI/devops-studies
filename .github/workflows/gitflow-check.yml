name: GitFlow Branch Check

on:
  pull_request:
    branches: [ develop, master ]

jobs:
  check-gitflow:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Naming Convention
        run: |
          DEST_BRANCH=${{ github.base_ref }}
          SRC_BRANCH=${{ github.head_ref }}
          
          echo "Destino: $DEST_BRANCH"
          echo "Origem: $SRC_BRANCH"

          if [[ "$DEST_BRANCH" == "master" ]]; then
            if [[ "$SRC_BRANCH" != release/* && "$SRC_BRANCH" != hotfix/* ]]; then
              echo "ERRO: A branch $DEST_BRANCH só aceita merges de release/ ou hotfix/."
              exit 1
            fi
          fi

          if [[ "$DEST_BRANCH" == "develop" ]]; then
            if [[ "$SRC_BRANCH" != feature/* && "$SRC_BRANCH" != bugfix/* && "$SRC_BRANCH" != release/* && "$SRC_BRANCH" != hotfix/* ]]; then
              echo "ERRO: A branch develop só aceita feature/, bugfix/, release/ ou hotfix/."
              exit 1
            fi
          fi