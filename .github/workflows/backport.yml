name: Automatic Backport

on:
  push:
    branches:
      - master  # Dispara sempre que algo entra na master (via merge de release ou hotfix)

jobs:
  create-backport-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa todo o histórico para conseguir fazer o merge

      - name: Create Backport Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop # Destino do PR
          branch: automation/backport-master-to-develop # Nome da branch temporária
          title: "🔄 Backport: Sync master into develop"
          body: |
            Este é um PR automático para garantir que as alterações da `master` (versão de produção) 
            sejam integradas de volta na `develop`.
            
            **Por favor, resolva conflitos se houverem.**
          commit-message: "chore: backport master to develop"
          delete-branch: true # Deleta a branch temporária após o merge