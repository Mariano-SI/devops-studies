name: Automatic Backport (Full Sync)

on:
  push:
    branches:
      - master # Dispara sempre que algo entra na master

jobs:
  sync-back-to-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para comparar o histórico das duas branches

      - name: Create Pull Request from Master to Develop
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "master"
          destination_branch: "develop"
          pr_title: "🔄 Full Sync: Master into Develop"
          pr_body: "Este PR sincroniza todas as diferenças da master de volta para a develop."
          pr_label: "backport"
          github_token: ${{ secrets.GITHUB_TOKEN }}
