name: Automatic Backport

on:
  pull_request:
    types: [closed]
    branches: [master] # Monitora quando um PR fecha na master

jobs:
  backport:
    name: Backport PR
    runs-on: ubuntu-latest
    # Só roda se o PR foi mergeado (e não apenas fechado/cancelado)
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Backport
        uses: korthout/backport-action@v3
        with:
          # Alvo do backport
          target_branches: develop
          # Token padrão (garanta que as permissões de PR estão ON no Settings)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Opcional: Adiciona o autor do PR original como responsável
          add_author_as_assignee: true